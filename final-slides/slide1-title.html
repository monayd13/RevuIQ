<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>RevuIQ - Title</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1920px;
            height: 1080px;
            background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }
        .content {
            text-align: center;
            z-index: 10;
            padding: 0 100px;
        }
        h1 {
            font-size: 120px;
            font-weight: 900;
            margin-bottom: 30px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: -2px;
        }
        .subtitle {
            font-size: 48px;
            font-weight: 600;
            margin-bottom: 20px;
            opacity: 0.95;
        }
        .tagline {
            font-size: 36px;
            font-weight: 400;
            opacity: 0.9;
            margin-bottom: 80px;
        }
        .footer {
            font-size: 32px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>RevuIQ</h1>
        <div class="subtitle">NLP-Powered Review Management System</div>
        <div class="tagline">Real-Time Sentiment Analysis with TextBlob & NLTK</div>
        <div class="footer">December 2025</div>
    </div>
</body>
</html>
