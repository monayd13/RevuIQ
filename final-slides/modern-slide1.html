<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <title>RevuIQ - Modern Title</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1920px;
            height: 1080px;
            background: #0A0E27;
            font-family: 'Space Grotesk', -apple-system, sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }
        
        /* Animated gradient background */
        .gradient-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            opacity: 0.15;
            animation: gradientShift 8s ease infinite;
        }
        
        @keyframes gradientShift {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(5deg); }
        }
        
        /* Geometric shapes */
        .shape {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            opacity: 0.1;
        }
        .shape1 {
            width: 600px;
            height: 600px;
            top: -200px;
            right: -100px;
            animation: float 20s ease-in-out infinite;
        }
        .shape2 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            left: -50px;
            animation: float 15s ease-in-out infinite reverse;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-50px) rotate(180deg); }
        }
        
        /* Content */
        .content {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 120px;
        }
        
        .label {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #667eea;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 180px;
            font-weight: 900;
            line-height: 0.9;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 48px;
            font-weight: 400;
            color: #a0aec0;
            margin-bottom: 60px;
            max-width: 1200px;
        }
        
        .tech-stack {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        
        .tech-badge {
            padding: 15px 35px;
            background: rgba(102, 126, 234, 0.1);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 50px;
            font-size: 22px;
            font-weight: 700;
            color: #667eea;
            backdrop-filter: blur(10px);
        }
        
        .footer {
            position: absolute;
            bottom: 60px;
            left: 120px;
            font-size: 20px;
            color: #4a5568;
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
    
    <div class="content">
        <div class="label">NLP Project 2025</div>
        <h1>RevuIQ</h1>
        <div class="subtitle">
            AI-powered review management with real-time sentiment analysis
        </div>
        <div class="tech-stack">
            <div class="tech-badge">TextBlob NLP</div>
            <div class="tech-badge">Naive Bayes</div>
            <div class="tech-badge">Next.js</div>
            <div class="tech-badge">FastAPI</div>
        </div>
    </div>
    
    <div class="footer">December 2025 • Natural Language Processing</div>
</body>
</html>
